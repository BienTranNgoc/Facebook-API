services:
    zookeeper:
        image: confluentinc/cp-zookeeper:7.6.1
        container_name: fb_api-zookeeper
        environment:
            ZOOKEEPER_CLIENT_PORT: 2181
            ZOOKEEPER_TICK_TIME: 2000
        ports:
            - "${ZOOKEEPER_HOST_PORT:-2181}:2181"

    kafka:
        image: confluentinc/cp-kafka:7.6.1
        container_name: fb_api-kafka
        depends_on:
            - zookeeper
        ports:
            - "${KAFKA_HOST_PORT:-9092}:9092"
        environment:
            KAFKA_BROKER_ID: 1
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
        healthcheck:
            test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
            interval: 10s
            timeout: 10s
            retries: 10

    kafka-init:
        image: confluentinc/cp-kafka:7.6.1
        container_name: fb_api-kafka-init
        depends_on:
            kafka:
                condition: service_started
        command:
            - /bin/bash
            - -c
            - |
                cub kafka-ready -b kafka:29092 1 60
                kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ${KAFKA_RAW_EVENTS_TOPIC:-raw_events} --partitions 1 --replication-factor 1
                kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ${KAFKA_REPLY_COMMANDS_TOPIC:-reply_commands} --partitions 1 --replication-factor 1
                kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ${KAFKA_SEND_RETRY_TOPIC:-send_retry} --partitions 1 --replication-factor 1
                kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ${KAFKA_SEND_FAILED_TOPIC:-send_failed} --partitions 1 --replication-factor 1
                kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic ${KAFKA_DEAD_LETTER_TOPIC:-dead_letter} --partitions 1 --replication-factor 1

    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: fb_api-kafka-ui
        depends_on:
            - kafka
        ports:
            - "${KAFKA_UI_HOST_PORT:-8080}:8080"
        environment:
            KAFKA_CLUSTERS_0_NAME: fb_api-local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
            KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

    kafka-exporter:
        image: danielqsj/kafka-exporter:latest
        container_name: fb_api-kafka-exporter
        depends_on:
            - kafka
        ports:
            - "${KAFKA_EXPORTER_HOST_PORT:-9308}:9308"
        command:
            - "--kafka.server=kafka:29092"

    mailpit:
        image: axllent/mailpit:latest
        container_name: fb_api-mailpit
        ports:
            - "1025:1025"
            - "8025:8025"

    prometheus:
        image: prom/prometheus:latest
        container_name: fb_api-prometheus
        depends_on:
            - kafka-exporter
        ports:
            - "${PROMETHEUS_HOST_PORT:-9090}:9090"
        volumes:
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
            - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
            - prometheus_data:/prometheus
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"

    alertmanager:
        image: prom/alertmanager:latest
        container_name: fb_api-alertmanager
        depends_on:
            - prometheus
        ports:
            - "${ALERTMANAGER_HOST_PORT:-9093}:9093"
        volumes:
            - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
        command:
            - "--config.file=/etc/alertmanager/alertmanager.yml"

    grafana:
        image: grafana/grafana:latest
        container_name: fb_api-grafana
        depends_on:
            - prometheus
        ports:
            - "${GRAFANA_HOST_PORT:-3004}:3000"
        volumes:
            - grafana_data:/var/lib/grafana
            - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
        env_file:
            - ./grafana/config.monitoring
        environment:
            - GF_INSTALL_PLUGINS=grafana-opensearch-datasource

    jaeger:
        image: jaegertracing/all-in-one:latest
        container_name: fb_api-jaeger
        ports:
            - "${JAEGER_HOST_PORT:-16686}:16686"

    opensearch:
        image: opensearchproject/opensearch:latest
        container_name: fb_api-opensearch
        environment:
            - cluster.name=opensearch-cluster
            - node.name=opensearch-node
            - discovery.type=single-node
            - bootstrap.memory_lock=true
            - OPENSEARCH_JAVA_OPTS=${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
            - DISABLE_INSTALL_DEMO_CONFIG=true
            - DISABLE_SECURITY_PLUGIN=true
        ulimits:
            memlock:
                soft: -1
                hard: -1
            nofile:
                soft: 65536
                hard: 65536
        ports:
            - "${OPENSEARCH_HOST_PORT:-9200}:9200"
            - "${OPENSEARCH_PERF_HOST_PORT:-9600}:9600"
        volumes:
            - opensearch_data:/usr/share/opensearch/data

    opensearch-dashboards:
        image: opensearchproject/opensearch-dashboards:latest
        container_name: fb_api-dashboards
        depends_on:
            - opensearch
        ports:
            - "${OPENSEARCH_DASHBOARDS_HOST_PORT:-5601}:5601"
        environment:
            - OPENSEARCH_HOSTS=["http://opensearch:9200"]
            - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
            - DATA_SOURCE_ENABLED=true
            - WORKSPACE_ENABLED=true
            - EXPLORE_ENABLED=true

    postgres:
        image: postgres:16
        container_name: fb_api-postgres
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-fb_api_db}
            POSTGRES_USER: ${POSTGRES_USER:-fb_api_user}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fb_api_password}
        ports:
            - "${POSTGRES_HOST_PORT:-5433}:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fb_api_user} -d ${POSTGRES_DB:-fb_api_db}"]
            interval: 10s
            timeout: 5s
            retries: 10

    backend-api:
        build:
            context: .
            dockerfile: services/backend-api/Dockerfile
        container_name: fb_api-backend-api
        depends_on:
            postgres:
                condition: service_healthy
            kafka-init:
                condition: service_completed_successfully
        environment:
            DEBUG: ${DEBUG:-True}
            ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,0.0.0.0,127.0.0.1,testserver}
            SECRET_KEY: ${SECRET_KEY:-django-insecure-local-fb-api-change-me}
            POSTGRES_DB: ${POSTGRES_DB:-fb_api_db}
            POSTGRES_USER: ${POSTGRES_USER:-fb_api_user}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fb_api_password}
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
            KAFKA_BOOTSTRAP_SERVERS: kafka:29092
            KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
            FACEBOOK_API_MODE: ${FACEBOOK_API_MODE:-mock}
            FACEBOOK_GRAPH_VERSION: ${FACEBOOK_GRAPH_VERSION:-v20.0}
            FACEBOOK_PAGE_ID: ${FACEBOOK_PAGE_ID:-}
            FACEBOOK_PAGE_ACCESS_TOKEN: ${FACEBOOK_PAGE_ACCESS_TOKEN:-}
            DASHBOARD_API_TOKEN: ${DASHBOARD_API_TOKEN:-}
        ports:
            - "${BACKEND_API_HOST_PORT:-3000}:3000"
        command: ["/bin/sh", "-c", "python manage.py migrate && python manage.py runserver 0.0.0.0:3000"]

    backend-api-worker:
        build:
            context: .
            dockerfile: services/backend-api/Dockerfile
        container_name: fb_api-backend-api-worker
        depends_on:
            backend-api:
                condition: service_started
            kafka-init:
                condition: service_completed_successfully
        environment:
            DEBUG: ${DEBUG:-True}
            ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,0.0.0.0,127.0.0.1,testserver}
            SECRET_KEY: ${SECRET_KEY:-django-insecure-local-fb-api-change-me}
            POSTGRES_DB: ${POSTGRES_DB:-fb_api_db}
            POSTGRES_USER: ${POSTGRES_USER:-fb_api_user}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fb_api_password}
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
            KAFKA_BOOTSTRAP_SERVERS: kafka:29092
            KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
            FACEBOOK_API_MODE: ${FACEBOOK_API_MODE:-mock}
            FACEBOOK_GRAPH_VERSION: ${FACEBOOK_GRAPH_VERSION:-v20.0}
            FACEBOOK_PAGE_ID: ${FACEBOOK_PAGE_ID:-}
            FACEBOOK_PAGE_ACCESS_TOKEN: ${FACEBOOK_PAGE_ACCESS_TOKEN:-}
        command: ["python", "manage.py", "consume_commands"]

    webhook-service:
        build:
            context: .
            dockerfile: services/webhook-service/Dockerfile
        container_name: fb_api-webhook-service
        depends_on:
            kafka-init:
                condition: service_completed_successfully
        environment:
            PORT: 3001
            KAFKA_BOOTSTRAP_SERVERS: kafka:29092
            KAFKA_RAW_EVENTS_TOPIC: ${KAFKA_RAW_EVENTS_TOPIC:-raw_events}
            WEBHOOK_VERIFY_TOKEN: ${WEBHOOK_VERIFY_TOKEN:-local-verify-token}
            FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
            REQUIRE_WEBHOOK_SIGNATURE: ${REQUIRE_WEBHOOK_SIGNATURE:-false}
        ports:
            - "${WEBHOOK_HOST_PORT:-3001}:3001"

    cloudflared:
        image: cloudflare/cloudflared:latest
        container_name: fb_api-cloudflared
        profiles:
            - tunnel
        depends_on:
            - webhook-service
        command:
            - tunnel
            - --no-autoupdate
            - --url
            - http://webhook-service:3001

    core-service:
        build:
            context: .
            dockerfile: services/core-service/Dockerfile
        container_name: fb_api-core-service
        depends_on:
            kafka-init:
                condition: service_completed_successfully
        environment:
            PORT: 3002
            KAFKA_BOOTSTRAP_SERVERS: kafka:29092
            KAFKA_RAW_EVENTS_TOPIC: ${KAFKA_RAW_EVENTS_TOPIC:-raw_events}
            KAFKA_REPLY_COMMANDS_TOPIC: ${KAFKA_REPLY_COMMANDS_TOPIC:-reply_commands}
            GEMINI_API_KEY: ${GEMINI_API_KEY:-}
            GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
        ports:
            - "${CORE_SERVICE_HOST_PORT:-3002}:3002"

    retry-service:
        build:
            context: .
            dockerfile: services/retry-service/Dockerfile
        container_name: fb_api-retry-service
        depends_on:
            kafka-init:
                condition: service_completed_successfully
        environment:
            PORT: 3003
            KAFKA_BOOTSTRAP_SERVERS: kafka:29092
            KAFKA_SEND_FAILED_TOPIC: ${KAFKA_SEND_FAILED_TOPIC:-send_failed}
            KAFKA_SEND_RETRY_TOPIC: ${KAFKA_SEND_RETRY_TOPIC:-send_retry}
            KAFKA_DEAD_LETTER_TOPIC: ${KAFKA_DEAD_LETTER_TOPIC:-dead_letter}
            MAX_RETRY_COUNT: ${MAX_RETRY_COUNT:-3}
            RETRY_BACKOFF_BASE_SECONDS: ${RETRY_BACKOFF_BASE_SECONDS:-1}
        ports:
            - "${RETRY_SERVICE_HOST_PORT:-3003}:3003"

volumes:
    postgres_data:
    prometheus_data:
    grafana_data:
    opensearch_data:
