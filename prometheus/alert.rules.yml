groups:
  - name: kafka_alerts
    rules:
      - alert: DeadLetterQueueReceived
        expr: >
          increase(
            kafka_topic_partition_current_offset{topic="dead_letter"}[1m]
          ) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "New message in Dead Letter Queue"
          description: >
            Topic dead_letter received new messages.
            Check Kafka UI at http://localhost:8080 for manual inspection.

      - alert: KafkaConsumerLagHigh
        expr: kafka_consumer_group_lag > 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Consumer lag is abnormally high"
          description: >
            Consumer group {{ $labels.consumergroup }}
            is lagging {{ $value }} messages on topic
            {{ $labels.topic }}.

      - alert: WebhookReceiverSilent
        expr: >
          increase(
            kafka_topic_partition_current_offset{topic="raw_events"}[5m]
          ) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No events from Facebook in 10 minutes"
          description: >
            Topic raw_events has no new messages.
            Verify Facebook Webhook subscription is active.