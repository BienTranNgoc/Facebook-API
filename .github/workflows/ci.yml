name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
      - run: pip install black flake8
      - name: Check formatting
        run: black --check --line-length=120 --diff services/
      - name: Lint
        run: >
          flake8 services/
          --max-line-length=120
          --extend-ignore=E203,W503
          --exclude='*/migrations/*,*/__pycache__/*'
          --count --statistics

  check-commits:
    name: Validate commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commit messages
        run: |
          PATTERN="^(feat|fix|docs|refactor|test|chore): .+"
          ERRORS=0
          COMMITS=$(git log --format="%s" origin/${{ github.base_ref }}..HEAD 2>/dev/null || echo "")
          [ -z "$COMMITS" ] && exit 0
          while IFS= read -r MSG; do
            [[ "$MSG" =~ ^Merge ]] && continue
            if [[ ! "$MSG" =~ $PATTERN ]]; then
              echo "error: \"$MSG\""
              ERRORS=$((ERRORS + 1))
            fi
          done <<< "$COMMITS"
          [ $ERRORS -gt 0 ] && { echo "$ERRORS invalid commit(s)"; exit 1; }

  check-branch:
    name: Validate branch
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          PATTERN="^(main|develop|feature/[a-z0-9._-]+|defect/[a-z0-9._-]+)$"
          if [[ ! "$BRANCH" =~ $PATTERN ]]; then
            echo "error: branch '$BRANCH' does not match convention"
            exit 1
          fi
      - name: Check PR target
        run: |
          BASE="${{ github.base_ref }}"
          HEAD="${{ github.head_ref }}"
          if [[ "$HEAD" =~ ^(feature|defect)/ ]] && [[ "$BASE" != "develop" ]]; then
            echo "error: $HEAD must target develop, not $BASE"
            exit 1
          fi
          if [[ "$BASE" == "main" ]] && [[ "$HEAD" != "develop" ]]; then
            echo "error: only develop can merge into main"
            exit 1
          fi

  test:
    name: Test and Coverage
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install coverage pytest pytest-cov pytest-django
          find services -name "requirements.txt" -exec pip install -r {} +
      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: ProjectConfig.settings
          DATABASE_URL: sqlite:///test.db
          FACEBOOK_API_MODE: mock
          SECRET_KEY: ci-test-key
          KAFKA_ENABLED: "false"
        run: |
          # Initialize coverage
          python -m coverage erase
          
          # Run tests for each service in parallel mode (-p) to allow combining later
          
          # Backend API (Django)
          cd services/backend-api && python -m coverage run -p --source=. manage.py test applications --verbosity=2 && cd ../..
          
          # Core Service
          PYTHONPATH=services/core-service python -m coverage run -p --source=services/core-service -m pytest services/core-service/test_core_*.py
          
          # Retry Service
          PYTHONPATH=services/retry-service python -m coverage run -p --source=services/retry-service -m pytest services/retry-service/test_retry_*.py
          
          # Webhook Service
          PYTHONPATH=services/webhook-service python -m coverage run -p --source=services/webhook-service -m pytest services/webhook-service/test_webhook_*.py
          
          # Move all coverage data files to root and combine
          find services -name ".coverage.*" -exec mv {} . \;
          python -m coverage combine
          
          # Generate reports
          python -m coverage xml -o coverage.xml
          python -m coverage report --show-missing
          
          # Enforce > 90% coverage (Note: will fail if currently below 90%)
          python -m coverage report --fail-under=90

      - name: Upload coverage to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  docker-validate:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config --quiet
